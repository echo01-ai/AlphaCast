output_dir: outputs
use_features: True
use_exogenous: True

datasets:
  - name: BS
    aliases: [bs]
    training_csv: data/raw/BS/train.csv
    test_csv: data/raw/BS/test.csv
    look_back: 96
    predicted_window: 96
    sliding_window: 96
    frequency: D
    checkpoints:
      Autoformer: checkpoints/BS/Autoformer.pth
      DLinear: checkpoints/BS/DLinear.pth
      iTransformer: checkpoints/BS/iTransformer.pth
      PatchTST: checkpoints/BS/PatchTST.pth
      TimesNet: checkpoints/BS/TimesNet.pth
    context_prompt_file: prompts/contextual_briefings/BS.txt

